name: Apply Anti-RU Anti-Private filter

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Generate RULE-SET
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: anti-ru-private-filter
  cancel-in-progress: false

jobs:
  filter:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: source

      - name: Checkout ruleset branch
        uses: actions/checkout@v7
        with:
          ref: ruleset
          path: ruleset
          fetch-depth: 0

      - name: Download exclusion sources
        run: |
          mkdir -p source/custom/exclude

          curl -fsSL "https://raw.githubusercontent.com/Davoyan/mihomo-rule-sets/main/rules/category-ru.lst" \
            | tr ' ' '\n' > source/custom/exclude/category-ru.lst

          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.list" \
            | tr ' ' '\n' > source/custom/exclude/geosite-private.list

          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.list" \
            | tr ' ' '\n' > source/custom/exclude/geoip-private.list

          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/ru.list" \
            | tr ' ' '\n' > source/custom/exclude/geoip-ru.list

      - name: Apply Anti-RU/Anti-Private filter
        run: |
          TARGET_NAMES=(
            proxy
            gfw
            tld-proxy
            ai
            apple
            apple-proxy
            microsoft
            onedrive
            gits
            google
            googlefcm
            youtube
            socialmedia
            tiktok
            forum
            telegram
            twitter
            meta
            discord
            twitch
            spotify
            netflix
            disney
            hbo
            primevideo
            hulu
            abema
            dmm
            niconico
            apple-tv
            dazn
            mytvsuper
            bahamut
            talkatone
            games
            ecommerce
            paypal
            crypto
            cdn
            speedtest
            iplocation-proxy
          )

          TARGETS=()
          : > source/anti-ru-private-targets.txt
          for name in "${TARGET_NAMES[@]}"; do
            file="ruleset/meta/${name}.list"
            if [ -f "$file" ]; then
              TARGETS+=("$file")
              echo "$name" >> source/anti-ru-private-targets.txt
            else
              echo "skip missing target: $file"
            fi
          done

          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo "No target rulesets were found in ruleset/meta"
            exit 1
          fi

          python3 source/scripts/exclude_ru_private_rules.py \
            --domain-exclude source/custom/exclude/category-ru.lst \
            --domain-exclude source/custom/exclude/geosite-private.list \
            --cidr-exclude source/custom/exclude/geoip-private.list \
            --cidr-exclude source/custom/exclude/geoip-ru.list \
            --targets "${TARGETS[@]}"

      - name: Regenerate Mihomo text rule-sets
        run: |
          while read -r name; do
            [ -n "$name" ] || continue
            src="ruleset/meta/${name}.list"

            rm -f "ruleset/meta/domain/${name}.list" "ruleset/meta/domain/${name}.mrs"
            rm -f "ruleset/meta/ipcidr/${name}.list" "ruleset/meta/ipcidr/${name}.mrs"

            awk -v output="ruleset/meta/domain/${name}.list" '
              /^DOMAIN,|^DOMAIN-SUFFIX,/ {
                sub(/^DOMAIN-SUFFIX,/, "+.");
                sub(/^DOMAIN,/, "");
                print > output;
              }
            ' "$src"

            awk -v output="ruleset/meta/ipcidr/${name}.list" '
              /^IP-CIDR6?,/ {
                sub(/^IP-CIDR6?,/, "");
                sub(/,no-resolve$/, "");
                print > output;
              }
            ' "$src"

            [ -s "ruleset/meta/domain/${name}.list" ] || rm -f "ruleset/meta/domain/${name}.list"
            [ -s "ruleset/meta/ipcidr/${name}.list" ] || rm -f "ruleset/meta/ipcidr/${name}.list"
          done < source/anti-ru-private-targets.txt

      - name: Download Mihomo core
        run: |
          mihomo_version=$(curl -fsSL https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt)
          wget "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-v3-${mihomo_version}.gz" -O - | gzip -d > ./mihomo
          chmod +x ./mihomo

      - name: Regenerate Mihomo MRS rule-sets
        run: |
          while read -r name; do
            [ -n "$name" ] || continue
            if [ -f "ruleset/meta/domain/${name}.list" ]; then
              ./mihomo convert-ruleset domain text "ruleset/meta/domain/${name}.list" "ruleset/meta/domain/${name}.mrs"
            fi
            if [ -f "ruleset/meta/ipcidr/${name}.list" ]; then
              ./mihomo convert-ruleset ipcidr text "ruleset/meta/ipcidr/${name}.list" "ruleset/meta/ipcidr/${name}.mrs"
            fi
          done < source/anti-ru-private-targets.txt

      - name: Regenerate sing-box JSON rule-sets
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          target_names = [line.strip() for line in Path("source/anti-ru-private-targets.txt").read_text().splitlines() if line.strip()]

          for name in target_names:
              src = Path("ruleset/meta") / f"{name}.list"
              if not src.is_file():
                  continue

              rule = {}
              for raw in src.read_text(encoding="utf-8", errors="ignore").splitlines():
                  line = raw.strip()
                  if not line or line.startswith(("#", ";")) or "," not in line:
                      continue
                  typ, value = line.split(",", 1)
                  typ = typ.strip().upper()
                  value = value.removesuffix(",no-resolve").strip().strip('"').strip("'")

                  key = None
                  if typ == "DOMAIN":
                      key = "domain"
                  elif typ == "DOMAIN-SUFFIX":
                      key = "domain_suffix"
                  elif typ == "DOMAIN-KEYWORD":
                      key = "domain_keyword"
                  elif typ == "DOMAIN-REGEX":
                      key = "domain_regex"
                  elif typ in {"IP-CIDR", "IP-CIDR6"}:
                      key = "ip_cidr"

                  if key:
                      rule.setdefault(key, []).append(value)

              for version in range(1, 5):
                  out_dir = Path("ruleset/singbox") / f"version{version}"
                  out_dir.mkdir(parents=True, exist_ok=True)
                  out_path = out_dir / f"{name}.json"
                  out_path.write_text(json.dumps({"version": version, "rules": [rule]}, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Download sing-box core
        run: |
          singbox_version="1.13.0-beta.1"
          wget "https://github.com/SagerNet/sing-box/releases/download/v${singbox_version}/sing-box-${singbox_version}-linux-amd64.tar.gz" -O - | tar -zxf -
          mv sing-box-${singbox_version}-linux-amd64/sing-box ./sing-box
          chmod +x ./sing-box

      - name: Regenerate sing-box SRS rule-sets
        run: |
          while read -r name; do
            [ -n "$name" ] || continue
            for file in ruleset/singbox/version*/"${name}.json"; do
              [ -f "$file" ] || continue
              ./sing-box rule-set compile --output "${file%.json}.srs" "$file"
            done
          done < source/anti-ru-private-targets.txt

      - name: Regenerate client text formats
        run: |
          mkdir -p ruleset/stash/domain ruleset/stash/ipcidr ruleset/shadowrocket ruleset/quantumultx ruleset/loon ruleset/egern ruleset/surge

          while read -r name; do
            [ -n "$name" ] || continue
            src="ruleset/meta/${name}.list"
            [ -f "$src" ] || continue

            cp "$src" "ruleset/stash/${name}.list"
            if [ -f "ruleset/meta/domain/${name}.list" ]; then
              cp "ruleset/meta/domain/${name}.list" "ruleset/stash/domain/${name}.list"
              [ -f "ruleset/meta/domain/${name}.mrs" ] && cp "ruleset/meta/domain/${name}.mrs" "ruleset/stash/domain/${name}.mrs"
            else
              rm -f "ruleset/stash/domain/${name}.list" "ruleset/stash/domain/${name}.mrs"
            fi
            if [ -f "ruleset/meta/ipcidr/${name}.list" ]; then
              cp "ruleset/meta/ipcidr/${name}.list" "ruleset/stash/ipcidr/${name}.list"
              [ -f "ruleset/meta/ipcidr/${name}.mrs" ] && cp "ruleset/meta/ipcidr/${name}.mrs" "ruleset/stash/ipcidr/${name}.mrs"
            else
              rm -f "ruleset/stash/ipcidr/${name}.list" "ruleset/stash/ipcidr/${name}.mrs"
            fi

            awk '{
              if ($0 ~/^DOMAIN-REGEX,/ || $0 ~ /^PROCESS-NAME,/) next;
              sub(/^IP-CIDR6/, "IP-CIDR");
              print;
            }' "$src" > "ruleset/shadowrocket/${name}.list"

            awk -v filename="$name" '{
              if ($0 ~ /^DOMAIN-REGEX,/ || $0 ~ /^PROCESS-NAME,/) next;
              sub(/^DOMAIN/, "HOST");
              sub(/^DOMAIN-SUFFIX/, "HOST-SUFFIX");
              sub(/^DOMAIN-KEYWORD/, "HOST-KEYWORD");
              sub(/^DOMAIN-WILDCARD/, "HOST-WILDCARD");
              sub(/^IP-CIDR6/, "IP6-CIDR");
              sub(/,no-resolve$/, "");
              print $0 "," filename;
            }' "$src" > "ruleset/quantumultx/${name}.list"

            awk '{
              if ($0 ~ /^DOMAIN-WILDCARD,/ || $0 ~ /^DOMAIN-REGEX,/ || $0 ~ /^PROCESS-NAME,/) next;
              print;
            }' "$src" > "ruleset/loon/${name}.list"

            awk '{
              if ($0 ~ /^DOMAIN-REGEX,/) next;
              print;
            }' "$src" > "ruleset/surge/${name}.list"

            grep -q ',no-resolve$' "$src" && found_no_resolve=1 || found_no_resolve=0
            awk -F',' -v found_no_resolve="$found_no_resolve" '
              BEGIN {
                if (found_no_resolve) print "no_resolve: true";
              }
              {
                if($1 == "DOMAIN-REGEX" && match($0, ",")){
                  $2 = substr($0, RSTART + 1);
                }
                sub(/^"/, "", $2);
                sub(/^'"'"'/, "", $2);
                sub(/"$/, "", $2);
                sub(/'"'"'$/, "", $2);
                chars = "[{}\\[\\]&*#|<>!%@`]";
                if ($2 ~ "^" chars) {
                  $2 = sprintf("\x27%s\x27", $2);
                }
                if ($1 == "DOMAIN") {
                  if (!domain++) print "domain_set:";
                  print "- " $2;
                } else if ($1 == "DOMAIN-SUFFIX") {
                  if (!suffix++) print "domain_suffix_set:";
                  print "- " $2;
                } else if ($1 == "DOMAIN-KEYWORD") {
                  if (!keyword++) print "domain_keyword_set:";
                  print "- " $2;
                } else if ($1 == "DOMAIN-WILDCARD") {
                  if (!wildcard++) print "domain_wildcard_set:";
                  print "- " $2;
                } else if ($1 == "DOMAIN-REGEX") {
                  if (!regex++) print "domain_regex_set:";
                  print "- " $2;
                } else if ($1 == "IP-CIDR") {
                  if (!cidr++) print "ip_cidr_set:";
                  print "- " $2;
                } else if ($1 == "IP-CIDR6") {
                  if (!cidr6++) print "ip_cidr6_set:";
                  print "- " $2;
                }
              }' "$src" > "ruleset/egern/${name}.yaml"
          done < source/anti-ru-private-targets.txt

      - name: Commit filtered ruleset branch
        id: commit
        run: |
          cd ruleset || exit 1
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add meta stash surge shadowrocket quantumultx loon egern singbox

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Anti-RU/Anti-Private changes to commit"
            exit 0
          fi

          git commit -m "Apply Anti-RU Anti-Private filter $(date -u +%Y-%m-%d)"
          git diff --name-only HEAD~1 HEAD > ../changed-files.txt
          git push origin ruleset
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr CDN
        if: steps.commit.outputs.changed == 'true'
        run: |
          while read -r file; do
            [ -n "$file" ] || continue
            curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@ruleset/${file}" || true
          done < changed-files.txt
